<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JobTrackr</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header>
      <img src="../icons/icon-48.svg" class="logo" alt="" />
      <div class="brand">
        <span class="brand-name">JobTrackr</span>
        <span class="brand-sub">Capture d'offre</span>
      </div>
    </header>

    <!-- States -->
    <div id="state-loading" class="state hidden">
      <div class="spinner"></div>
      <p>Analyse de la page en cours…</p>
    </div>

    <div id="state-error" class="state hidden">
      <div class="icon-big">⚠️</div>
      <p id="error-msg">Une erreur est survenue.</p>
      <button id="btn-retry" class="btn btn-secondary">Réessayer</button>
    </div>

    <div id="state-result" class="state hidden">
      <div class="field">
        <label>Entreprise</label>
        <input id="field-company" type="text" placeholder="Nom de l'entreprise" />
      </div>
      <div class="field">
        <label>Poste</label>
        <input id="field-position" type="text" placeholder="Intitulé du poste" />
      </div>
      <div class="field row">
        <div class="field-half">
          <label>Contrat</label>
          <select id="field-contract">
            <option value="">—</option>
            <option value="CDI">CDI</option>
            <option value="CDD">CDD</option>
            <option value="Freelance">Freelance</option>
            <option value="Stage">Stage</option>
            <option value="Alternance">Alternance</option>
          </select>
        </div>
        <div class="field-half">
          <label>Statut</label>
          <select id="field-status">
            <option value="todo">À postuler</option>
            <option value="sent">Envoyée</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Note rapide</label>
        <textarea id="field-notes" rows="2" placeholder="Source, contact, remarque…"></textarea>
      </div>

      <div class="actions">
        <button id="btn-add" class="btn btn-primary">➕ Ajouter à JobTrackr</button>
        <button id="btn-reanalyze" class="btn btn-ghost">↺ Ré-analyser</button>
      </div>
    </div>

    <div id="state-done" class="state hidden">
      <div class="icon-big">✅</div>
      <p><strong id="done-label"></strong> ajouté !</p>
      <button id="btn-open-app" class="btn btn-primary">Ouvrir JobTrackr</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
