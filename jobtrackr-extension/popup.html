<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>JobTrackr</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; width: 360px; background: #f8fafc; color: #1e293b; }
    .header { background: #4f46e5; color: white; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
    .logo { width: 28px; height: 28px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
    .header-text h1 { font-size: 14px; font-weight: 700; }
    .header-text p { font-size: 11px; opacity: 0.7; margin-top: 1px; }
    .content { padding: 12px 14px; }
    .source-badge { display: inline-flex; align-items: center; gap: 5px; background: #e0e7ff; color: #4338ca; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; margin-bottom: 10px; }
    .field { margin-bottom: 9px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
    .field input, .field select { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px 9px; font-size: 12px; color: #1e293b; background: white; outline: none; font-family: inherit; }
    .field input:focus, .field select:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .jd-section { margin-bottom: 9px; }
    .jd-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .jd-label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .jd-status { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
    .jd-status.found { background: #dcfce7; color: #16a34a; }
    .jd-status.not-found { background: #fef3c7; color: #92400e; }
    .jd-status.analyzing { background: #e0e7ff; color: #4338ca; }
    .jd-preview { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 7px 9px; font-size: 11px; color: #475569; max-height: 70px; overflow-y: auto; line-height: 1.4; }
    .screenshot-btn { width: 100%; padding: 7px; border: 1px dashed #c7d2fe; border-radius: 8px; background: #f5f3ff; color: #6366f1; font-size: 11px; font-weight: 500; cursor: pointer; margin-bottom: 9px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
    .screenshot-btn:hover { background: #ede9fe; border-color: #a5b4fc; }
    .screenshot-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn { width: 100%; padding: 9px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; margin-top: 3px; }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .loading { text-align: center; padding: 20px 16px; color: #94a3b8; font-size: 13px; }
    .spinner { width: 22px; height: 22px; border: 2px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; font-size: 11px; padding: 6px 12px; border-radius: 20px; white-space: nowrap; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .settings-link { display: block; text-align: center; font-size: 10px; color: #94a3b8; margin-top: 8px; cursor: pointer; text-decoration: underline; }
    .settings-panel { background: #f1f5f9; border-radius: 8px; padding: 9px; margin-top: 6px; }
    .settings-panel label { font-size: 11px; color: #64748b; font-weight: 600; display: block; margin-bottom: 3px; }
    .settings-panel input { width: 100%; border: 1px solid #e2e8f0; border-radius: 6px; padding: 5px 8px; font-size: 11px; outline: none; background: white; }
    .save-btn { margin-top: 5px; background: #6366f1; color: white; border: none; border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-weight: 600; }
    .divider { display: flex; align-items: center; gap: 8px; margin: 8px 0; color: #cbd5e1; font-size: 10px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
    /* Autofill button */
    .autofill-btn { width: 100%; padding: 7px; border: 1px dashed #86efac; border-radius: 8px; background: #f0fdf4; color: #16a34a; font-size: 11px; font-weight: 500; cursor: pointer; margin-bottom: 6px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
    .autofill-btn:hover { background: #dcfce7; border-color: #4ade80; }
    .autofill-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    /* API key panel — same style as settings-panel */
    .apikey-panel { background: #f1f5f9; border-radius: 8px; padding: 9px; margin-top: 4px; }
    .apikey-panel label { font-size: 11px; color: #64748b; font-weight: 600; display: block; margin-bottom: 3px; }
    .apikey-panel input { width: 100%; border: 1px solid #e2e8f0; border-radius: 6px; padding: 5px 8px; font-size: 11px; outline: none; background: white; font-family: monospace; }
    .apikey-panel .hint { font-size: 10px; color: #94a3b8; margin-top: 4px; }
    .apikey-saved { font-size: 10px; color: #16a34a; font-weight: 600; margin-left: 6px; display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">J</div>
    <div class="header-text">
      <h1>JobTrackr</h1>
      <p>Ajouter cette offre</p>
    </div>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <span id="loading-text">Lecture de la page...</span>
  </div>

  <div id="main" class="content" style="display:none">
    <div id="source-badge" class="source-badge">
      <span>🌐</span>
      <span id="source-name">Page web</span>
    </div>

    <div class="field">
      <label>Entreprise *</label>
      <input type="text" id="company" placeholder="ex: Pennylane" />
    </div>
    <div class="field">
      <label>Poste *</label>
      <input type="text" id="position" placeholder="ex: Senior Product Manager" />
    </div>
    <div class="row">
      <div class="field">
        <label>Statut</label>
        <select id="status">
          <option value="todo">📌 À postuler</option>
          <option value="sent">📤 Envoyée</option>
          <option value="interview">📞 Entretien</option>
        </select>
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="date" />
      </div>
    </div>

    <div class="jd-section">
      <div class="jd-header">
        <span class="jd-label">Description du poste</span>
        <span id="jd-status" class="jd-status not-found">Non détectée</span>
      </div>
      <div id="jd-preview" class="jd-preview" style="display:none"></div>
    </div>

    <div class="divider">ou</div>
    <button class="screenshot-btn" id="screenshot-btn">
      <span id="screenshot-icon">🔍</span>
      <span id="screenshot-text">Analyser toute la page avec l'IA</span>
    </button>

    <button class="btn btn-primary" id="add-btn" disabled>+ Ajouter à JobTrackr</button>

    <!-- Autofill button -->
    <div class="divider">ou</div>
    <button class="autofill-btn" id="autofill-btn">
      <span>✦</span>
      <span id="autofill-text">Autofill le formulaire de candidature</span>
    </button>

    <!-- Settings -->
    <span class="settings-link" id="toggle-settings">⚙️ Configurer l'URL de l'app</span>
    <div id="settings-panel" class="settings-panel" style="display:none">
      <label>URL de votre JobTrackr</label>
      <input type="text" id="app-url" placeholder="https://jobtracking-three.vercel.app" />
      <button class="save-btn" id="save-settings">Sauvegarder</button>
    </div>

    <!-- API Key -->
    <span class="settings-link" id="toggle-apikey" style="margin-top:4px">🔑 Clé API Claude (Autofill)</span>
    <div id="apikey-panel" class="apikey-panel" style="display:none">
      <label>Clé Anthropic <span id="apikey-saved" class="apikey-saved">✓ Sauvegardée</span></label>
      <input type="password" id="apikey-input" placeholder="sk-ant-api03-…" autocomplete="off" />
      <div class="hint">Stockée localement dans Firefox uniquement.</div>
      <button class="save-btn" id="save-apikey" style="margin-top:5px">Sauvegarder la clé</button>
    </div>

    <!-- Sync from JobTrackr -->
    <div style="margin-top:8px; padding:8px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:8px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;">
        <span style="font-size:11px; font-weight:600; color:#15803d;">📥 Données JobTrackr</span>
        <span id="sync-status" style="font-size:10px; color:#6b7280;"></span>
      </div>
      <div id="sync-info" style="font-size:10px; color:#374151; margin-bottom:6px; line-height:1.4; display:none;"></div>
      <button id="sync-btn" style="width:100%; padding:5px 8px; background:#16a34a; color:white; border:none; border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; transition:all 0.15s;">
        🔄 Sync CV + Profil depuis l'app
      </button>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
